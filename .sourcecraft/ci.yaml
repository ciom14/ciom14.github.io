on:
  push:
    - workflows: [deploy-workflow]
      filter:
        branches: ["main"]

workflows:
  deploy-workflow:
    tasks:
      - name: build-task
        cubes:
          - name: install-and-build
            script:
              - pip install mkdocs mkdocs-material
              - cd source && mkdocs build -d ../docs
              - git config user.name "SourceCraft CI"
              - git config user.email "ci@sourcecraft.dev"
              - git add ../docs
              - git commit -m "build: auto deploy via SourceCraft CI" || echo "Nothing to commit"
              - git push origin main