on:
  push:
    - workflows: [deploy-workflow]
      filter:
        branches: ["main"]

workflows:
  deploy-workflow:
    tasks:
      - name: build-task
        cubes:
          - name: install-and-build
            script:
              - pip install mkdocs mkdocs-material
              - mkdocs build -d docs --config-file source/mkdocs.yml
              - git config user.name ci-bot
              - git config user.email ci@bot.dev
              - git checkout main
              - git add docs/
              - git commit -m "build auto deploy" || echo "Nothing to commit"
              - git push origin main